name: Build DisplaySnooze

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build DisplaySnooze.exe
        shell: powershell
        run: ./Build.ps1

      - name: Sign with local self-signed certificate
        shell: powershell
        run: ./Sign-DisplaySnooze.ps1

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: DisplaySnooze-windows
          path: |
            DisplaySnooze.exe
            DisplaySnoozeLocalCodeSigning.cer

  linux:
    name: Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Check shell scripts
        run: |
          bash -n linux/displaysnooze
          bash -n packaging/linux/build-linux-packages.sh

      - name: Build Linux packages
        run: |
          chmod +x linux/displaysnooze packaging/linux/build-linux-packages.sh
          VERSION=0.1.2 ARCH=all packaging/linux/build-linux-packages.sh

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: DisplaySnooze-linux
          path: dist/linux/*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p release
          find release-artifacts -maxdepth 3 -type f -print -exec cp {} release/ \;
          ls -la release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v0.1.2"
          title="DisplaySnooze 0.1.2"
          notes="$(cat <<'NOTES'
          Download DisplaySnooze here if you just want the built files.

          Windows:
          - DisplaySnooze.exe
          - DisplaySnoozeLocalCodeSigning.cer
          - Default guard is now 10 minutes to cover delayed wake events like the one measured during testing.
          - Press Escape while DisplaySnooze is guarding to cancel early.

          Linux:
          - portable tar.gz
          - Debian/Ubuntu .deb
          - Fedora/RPM .rpm
          - Default guard is now 10 minutes.
          - Press Escape in the terminal while DisplaySnooze is guarding to cancel early.

          The Windows EXE is signed with a local self-signed certificate, so Windows may still show it as an unknown publisher unless you trust that certificate.
          NOTES
          )"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes "$notes"
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* --title "$title" --notes "$notes"
          fi
